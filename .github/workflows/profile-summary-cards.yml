name: Update GitHub Profile Summary Cards

# 毎日0時に自動実行 / 手動トリガーも可能
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-cards:
    runs-on: ubuntu-latest
    name: Generate and Push Profile Summary Cards

    steps:
      # 1️⃣ リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ GitHub Profile Summary Cardsを生成
      - name: Generate Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@v1
        with:
          USERNAME: ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ 生成されたSVGをコミット & push
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/
          git commit -m "Update profile summary cards" || echo "No changes to commit"
          git push
